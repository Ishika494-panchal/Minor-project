<div class="dashboard-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="assets/skillzyy-logo.png" alt="Skillzyy Logo" class="logo">
      <h2>Skillzyy Admin</h2>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/admin-dashboard" class="nav-item">
        <i class="fas fa-home"></i> Dashboard
      </a>
      <a routerLink="/manage-users" class="nav-item">
        <i class="fas fa-users"></i> Users
      </a>
      <a routerLink="/admin-projects" class="nav-item">
        <i class="fas fa-project-diagram"></i> Projects
      </a>
      <a routerLink="/admin-revenue" class="nav-item">
        <i class="fas fa-dollar-sign"></i> Revenue
      </a>
      <a routerLink="/admin-messages" class="nav-item">
        <i class="fas fa-envelope"></i> Messages
      </a>
      <a routerLink="/admin-security" class="nav-item">
        <i class="fas fa-shield-alt"></i> Security
      </a>
      <a routerLink="/admin-settings" class="nav-item">
        <i class="fas fa-cog"></i> Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Header -->
    <header class="dashboard-header">
      <h1>Admin Dashboard</h1>
      <div class="header-actions">
        <button class="notification-btn" (click)="goToNotifications()">
          <i class="fas fa-bell"></i>
        </button>
        <div class="user-avatar" (click)="goToSettings()">
          <i class="fas fa-user-shield"></i>
        </div>
      </div>
    </header>

    <!-- Stats Cards -->
    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon users">
          <i class="fas fa-users"></i>
        </div>
        <div class="stat-info">
          <span class="stat-value">{{ stats.totalUsers }}</span>
          <span class="stat-label">Total Users</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon projects">
          <i class="fas fa-project-diagram"></i>
        </div>
        <div class="stat-info">
          <span class="stat-value">{{ stats.activeProjects }}</span>
          <span class="stat-label">Active Projects</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon revenue">
          <i class="fas fa-dollar-sign"></i>
        </div>
        <div class="stat-info">
          <span class="stat-value">₹{{ stats.totalRevenue }}</span>
          <span class="stat-label">Total Revenue</span>
        </div>
      </div>
    </section>

    <!-- Recent Activity -->
    <section class="recent-activity">
      <div class="section-header">
        <h2>Recent Activity</h2>
        <button class="view-all-btn">View All</button>
      </div>
      <div class="activity-list">
        <div class="activity-item" *ngFor="let activity of recentActivities">
          <div class="activity-icon">
            <i class="fas fa-bell"></i>
          </div>
          <div class="activity-info">
            <span class="activity-action">{{ activity.action }}</span>
            <span class="activity-user">{{ activity.user }}</span>
          </div>
          <span class="activity-time">{{ activity.time }}</span>
        </div>
      </div>
    </section>
  </main>
</div>
