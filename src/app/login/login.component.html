<div class="login-page">
  <div class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-header">
        <a (click)="goToLanding()">
          <img src="assets/skillzyy-logo.png" alt="Skillzyy Logo" class="login-logo">
        </a>
        <h2>Welcome Back</h2>
        <p>Sign in to continue to Skillzyy</p>
      </div>

      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage">
        <i class="fas fa-exclamation-circle"></i>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Login Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <!-- Email Field -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input
              type="email"
              id="email"
              formControlName="email"
              placeholder="Enter your email"
              [class.error]="f['email'].touched && f['email'].invalid"
            >
          </div>
          <div class="error-text" *ngIf="f['email'].touched && f['email'].errors">
            <small *ngIf="f['email'].errors['required']">Email is required</small>
            <small *ngIf="f['email'].errors['email']">Please enter a valid email</small>
          </div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input
              [type]="passwordVisible ? 'text' : 'password'"
              id="password"
              formControlName="password"
              placeholder="Enter your password"
              [class.error]="f['password'].touched && f['password'].invalid"
            >
            <button
              type="button"
              class="password-toggle"
              (click)="togglePasswordVisibility()"
            >
              <i [class]="passwordVisible ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
            </button>
          </div>
          <div class="error-text" *ngIf="f['password'].touched && f['password'].errors">
            <small *ngIf="f['password'].errors['required']">Password is required</small>
            <small *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</small>
          </div>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="form-options">
          <label class="checkbox-container">
            <input type="checkbox" formControlName="rememberMe">
            <span class="checkmark"></span>
            Remember me
          </label>
          <a href="#" class="forgot-password" (click)="onForgotPassword(); $event.preventDefault()">
            Forgot password?
          </a>
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          class="login-btn"
          [disabled]="isLoading"
        >
          <span *ngIf="!isLoading">Sign In</span>
          <div class="spinner" *ngIf="isLoading"></div>
        </button>
      </form>

      <!-- Signup Link -->
      <div class="signup-link">
        <p>Don't have an account? <a (click)="onSignup()">Sign Up</a></p>
      </div>

    </div>
  </div>
</div>
